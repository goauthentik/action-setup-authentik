name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    permissions:
      # Needed for checkout
      contents: read
      # Needed for codecov OIDC token
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run ci-test
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          use_oidc: true
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          use_oidc: true
          report_type: test_results
  test:
    name: Test - ${{ matrix.cases.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        cases:
          - label: "Stable"
            options:
              version: "stable"
              sentry_env: "goauthentik-action-setup-authentik-ci"
          - label: "Beta"
            options:
              version: "beta"
              sentry_env: "goauthentik-action-setup-authentik-ci"
          - label: "Enterprise"
            options:
              version: "beta"
              sentry_env: "goauthentik-action-setup-authentik-ci"
              enterprise_license: true
          - label: "Blueprints + Custom wait"
            options:
              version: "stable"
              sentry_env: "goauthentik-action-setup-authentik-ci"
              blueprints_path: "./testing/blueprints"
              wait_url: http://localhost:9000/application/o/test/.well-known/openid-configuration
          - label: "Blueprints + External wait"
            options:
              version: "stable"
              sentry_env: "goauthentik-action-setup-authentik-ci"
              blueprints_path: "./testing/blueprints"
            test: |
              set -x
              while true; do
                  objs=$(curl -s -H "Authorization: Bearer ${AUTHENTIK_BOOTSTRAP_TOKEN}" 'http://localhost:9000/api/v3/providers/all/?search=test')
                  count=$(echo $objs | jq .pagination.count)
                  if [[ "$count" == "1" ]]; then
                      exit 0
                  fi
                  sleep 5
              done
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v3
      - uses: ./
        id: setup
        with: ${{ matrix.cases.options }}
      - if: ${{ matrix.cases.test != '' }}
        timeout-minutes: 5
        env:
          AUTHENTIK_BOOTSTRAP_TOKEN: ${{ steps.setup.outputs.admin_token }}
        run: ${{ matrix.cases.test }}
