name: Tests
on:
  pull_request:
    paths-ignore:
      - "README.md"
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-dist:
    name: Check dist/ is up to date
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run bundle
      - name: Compare dist/ directory
        run: |
          if [ "$(git status --porcelain dist/ | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes after build. Run 'npm run build' and commit the result. See status below:"
            git diff dist/
            exit 1
          fi

  test:
    needs: check-dist
    name: Test - ${{ matrix.cases.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        cases:
          - label: "Stable"
            options:
              version: "stable"
              sentry_env: "goauthentik-action-setup-authentik-ci"
          - label: "Beta"
            options:
              version: "beta"
              sentry_env: "goauthentik-action-setup-authentik-ci"
          - label: "Enterprise"
            options:
              version: "beta"
              sentry_env: "goauthentik-action-setup-authentik-ci"
              enterprise_license: true
          - label: "Blueprints + Custom wait"
            options:
              version: "stable"
              sentry_env: "goauthentik-action-setup-authentik-ci"
              blueprints_path: "./testing/blueprints"
              wait_url: http://localhost:9000/application/o/test/.well-known/openid-configuration
          - label: "Blueprints + External wait"
            options:
              version: "stable"
              sentry_env: "goauthentik-action-setup-authentik-ci"
              blueprints_path: "./testing/blueprints"
            test: |
              set -x
              while true; do
                  objs=$(curl -s -H "Authorization: Bearer ${AUTHENTIK_BOOTSTRAP_TOKEN}" 'http://localhost:9000/api/v3/providers/all/?search=test')
                  count=$(echo $objs | jq .pagination.count)
                  if [[ "$count" == "1" ]]; then
                      exit 0
                  fi
                  sleep 5
              done
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v3
      - uses: ./
        id: setup
        with: ${{ matrix.cases.options }}
      - if: ${{ matrix.cases.test != '' }}
        timeout-minutes: 5
        env:
          AUTHENTIK_BOOTSTRAP_TOKEN: ${{ steps.setup.outputs.admin_token }}
        run: ${{ matrix.cases.test }}
