name: "authentik Setup"
description: "Sets up an authentik test environment"
inputs:
  version:
    description: "stable/beta or any other version tag"
    required: false
    default: "stable"
  sentry_env:
    description: "Sentry environment to send traces to."
    required: false
    default: "github-actions"
  wait:
    description: "If the action should wait for authentik to be available"
    required: false
    default: "true"
  wait_url:
    description: "URL to check if authentik is running and configured"
    required: false
    default: http://localhost:9000/api/v3/root/config/
  blueprints_path:
    description: "Optional path to a folder containing blueprints, which are mounted into the authentik containers."
    required: false
    default: ""
  enterprise_license:
    description: "If set to true, automatically retrieve and install a dev enterprise license from the goauthentik customer portal. Requires the calling workflow to grant `permissions: id-token: write`."
    required: false
    default: "false"
  enterprise_license_users_internal:
    description: "Number of internal users to request for the enterprise license."
    required: false
    default: "1"
  enterprise_license_users_external:
    description: "Number of external users to request for the enterprise license."
    required: false
    default: "1"

outputs:
  admin_token:
    description: "API token for akadmin User"
  admin_password:
    description: "Password for akadmin User"
  http_url:
    description: "Base URL to access authentik at"
  https_url:
    description: "Base URL to access authentik at (HTTPS)"
  server_container_id:
    description: id of the server container
  worker_container_id:
    description: id of the worker container
  enterprise_license_key:
    description: The enterprise license key retrieved and installed, if `enterprise_license` is set to true

runs:
  using: node24
  main: dist/index.js
  post: dist/post.js
  post-if: always()
